}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Plus Jakarta Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}

/* Ledger-line background pattern */
body::before {
content: ‘’;
position: fixed; inset: 0; z-index: 0; pointer-events: none;
background:
linear-gradient(transparent calc(100% - 1px), rgba(59,91,219,.055) 100%);
background-size: 100% 48px;
opacity: 1;
}

/* Soft gradient corner orbs */
body::after {
content: ‘’;
position: fixed; inset: 0; z-index: 0; pointer-events: none;
background:
radial-gradient(ellipse 55% 45% at 5% 0%, rgba(14,164,114,.12) 0%, transparent 100%),
radial-gradient(ellipse 50% 50% at 95% 100%, rgba(59,91,219,.10) 0%, transparent 100%);
}

.page { display:none; position:relative; z-index:1 }
.page.active { display:flex; flex-direction:column; min-height:100vh }

/* ── LANGUAGE SWITCHER ── */
.lang-bar {
position: fixed; top: 16px; right: 20px; z-index: 200;
display: flex; gap: 2px;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 999px; padding: 3px;
box-shadow: var(–sh);
}
.lang-btn {
padding: 5px 14px; border-radius: 999px; border: none;
cursor: pointer;
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px; font-weight: 700;
transition: all .18s; background: transparent; color: var(–muted);
letter-spacing: .5px;
}
.lang-btn.active {
background: var(–a1); color: #fff;
box-shadow: 0 2px 10px var(–a-glow);
}

/* ── HOME ── */
#home {
align-items: center; justify-content: flex-start;
padding: 72px 20px 64px; text-align: center;
}
.home-inner { max-width: 900px; width: 100%; margin: 0 auto }

/* Floating ledger cards decoration */
.home-deco {
position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
width: 100%; max-width: 900px; height: 100%; pointer-events: none; overflow: hidden;
}
.deco-pill {
position: absolute; border-radius: 999px; font-family: ‘JetBrains Mono’, monospace;
font-size: 10px; font-weight: 700; padding: 5px 12px; opacity: .6;
white-space: nowrap; letter-spacing: .5px;
}
.deco-pill:nth-child(1){ top:40px;  left:2%;  background:rgba(14,164,114,.12); color:var(–a1); animation: float1 6s ease-in-out infinite }
.deco-pill:nth-child(2){ top:80px;  right:3%; background:rgba(59,91,219,.10); color:var(–b1); animation: float2 7s ease-in-out infinite }
.deco-pill:nth-child(3){ top:140px; left:5%;  background:rgba(14,164,114,.08); color:var(–a1); animation: float1 8s ease-in-out infinite .5s }
.deco-pill:nth-child(4){ top:20px;  right:8%; background:rgba(59,91,219,.07); color:var(–b1); animation: float2 9s ease-in-out infinite 1s }

@keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.badge {
display: inline-flex; align-items: center; gap: 7px;
background: linear-gradient(135deg, var(–a1), var(–a2));
color: #fff; font-family: ‘JetBrains Mono’, monospace;
font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
text-transform: uppercase; padding: 7px 18px;
border-radius: 999px; margin-bottom: 22px;
box-shadow: 0 4px 18px var(–a-glow);
animation: popIn .55s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn {
from { opacity:0; transform:scale(.6) translateY(8px) }
to   { opacity:1; transform:scale(1)  translateY(0) }
}

.home-title {
font-family: ‘Sora’, sans-serif;
font-size: clamp(44px, 7.5vw, 86px);
font-weight: 800; line-height: 1.0; letter-spacing: -2px;
margin-bottom: 14px;
color: var(–text);
animation: riseIn .55s .15s cubic-bezier(.4,0,.2,1) both;
}
.home-title span {
background: linear-gradient(135deg, var(–a1) 0%, var(–b1) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
@keyframes riseIn {
from { opacity:0; transform:translateY(20px) }
to   { opacity:1; transform:translateY(0) }
}

.home-sub {
font-size: 16px; color: var(–text-2); margin-bottom: 44px;
font-weight: 500; line-height: 1.6;
animation: riseIn .55s .28s cubic-bezier(.4,0,.2,1) both;
}

/* Course tabs */
.course-tabs {
display: flex; gap: 8px; justify-content: center;
margin-bottom: 32px; flex-wrap: wrap;
animation: riseIn .55s .36s cubic-bezier(.4,0,.2,1) both;
}
.course-tab {
padding: 10px 24px; border-radius: var(–r);
font-size: 14px; font-weight: 700;
cursor: pointer; border: 2px solid var(–border);
background: var(–surface); color: var(–muted);
transition: all .2s; font-family: ‘Plus Jakarta Sans’, sans-serif;
box-shadow: var(–sh);
}
.course-tab.active-tab { color: #fff; border-color: transparent; transform: translateY(-1px) }
.tab-basica.active-tab { background: linear-gradient(135deg,var(–a1),var(–a2)); box-shadow: 0 6px 22px var(–a-glow) }
.tab-sepe.active-tab   { background: linear-gradient(135deg,var(–b1),var(–b2)); box-shadow: 0 6px 22px var(–b-glow) }
.course-tab:hover:not(.active-tab) { border-color: var(–a1); color: var(–a1); transform: translateY(-1px) }

.course-panel { display: none }
.course-panel.active-panel { display: block; animation: fadeUp .3s ease }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.section-label {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
letter-spacing: 2px; text-transform: uppercase;
margin-bottom: 16px; padding-left: 4px; font-weight: 700;
}
.section-label.gold { color: var(–a1) }
.section-label.blue { color: var(–b1) }

/* Topic cards */
.topic-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(188px,1fr));
gap: 12px; margin-bottom: 32px;
}
.topic-card {
background: var(–surface); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 18px 16px 16px; cursor: pointer;
transition: all .2s; text-align: left; position: relative; overflow: hidden;
box-shadow: var(–sh);
}
/* Left accent bar */
.topic-card::before {
content: ‘’;
position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
transform: scaleY(0); transform-origin: bottom; transition: transform .25s ease;
border-radius: 0 2px 2px 0;
}
.gold-card::before { background: linear-gradient(to top, var(–a1), var(–a2)) }
.blue-card::before { background: linear-gradient(to top, var(–b1), var(–b2)) }
.topic-card:hover::before, .topic-card.selected::before { transform: scaleY(1) }

.gold-card:hover,.gold-card.selected {
border-color: var(–a1); background: var(–a-soft);
transform: translateY(-2px); box-shadow: var(–sh-md);
}
.blue-card:hover,.blue-card.selected {
border-color: var(–b1); background: var(–b-soft);
transform: translateY(-2px); box-shadow: var(–sh-md);
}

.topic-num {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
letter-spacing: 1px; margin-bottom: 8px; font-weight: 700;
}
.gold-card .topic-num { color: var(–a1) }
.blue-card .topic-num { color: var(–b1) }

.topic-name { font-size: 13px; font-weight: 700; line-height: 1.4; color: var(–text) }

.topic-check {
position: absolute; top: 14px; right: 14px;
width: 20px; height: 20px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 10px; font-weight: 900; opacity: 0;
transition: all .2s; color: #fff;
}
.gold-card .topic-check { background: var(–a1); box-shadow: 0 2px 8px var(–a-glow) }
.blue-card .topic-check { background: var(–b1); box-shadow: 0 2px 8px var(–b-glow) }
.topic-card.selected .topic-check { opacity: 1; transform: scale(1.1) }

/* Buttons */
.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap }
.btn {
display: inline-flex; align-items: center; gap: 8px;
padding: 13px 30px; border-radius: var(–r);
font-family: ‘Plus Jakarta Sans’, sans-serif;
font-size: 15px; font-weight: 700;
cursor: pointer; border: none; transition: all .2s;
}
.btn-gold {
background: linear-gradient(135deg, var(–a1) 0%, var(–a2) 100%);
color: #fff; box-shadow: 0 6px 20px var(–a-glow);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(–a-glow); filter: brightness(1.05) }
.btn-blue {
background: linear-gradient(135deg, var(–b1) 0%, var(–b2) 100%);
color: #fff; box-shadow: 0 6px 20px var(–b-glow);
}
.btn-blue:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(–b-glow); filter: brightness(1.05) }
.btn-ghost {
background: var(–surface); color: var(–text-2);
border: 1.5px solid var(–border); box-shadow: var(–sh);
}
.btn-ghost:hover { border-color: var(–a1); color: var(–a1); transform: translateY(-1px) }

/* ── QUIZ ── */
#quiz { padding: 0; flex-direction: column }

.quiz-topbar {
display: flex; align-items: center; justify-content: space-between;
padding: 14px 28px;
background: rgba(255,255,255,.88);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-bottom: 1.5px solid var(–border);
position: sticky; top: 0; z-index: 10;
box-shadow: 0 2px 16px rgba(15,25,35,.06);
}
.quiz-logo {
font-family: ‘Sora’, sans-serif; font-weight: 800; font-size: 17px;
background: linear-gradient(135deg, var(–a1), var(–b1));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.quiz-logo.sepe {
background: linear-gradient(135deg, var(–b1), var(–b2));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.quiz-meta { display: flex; align-items: center; gap: 16px }
.q-counter {
font-family: ‘JetBrains Mono’, monospace; font-size: 12px; font-weight: 700;
color: var(–a1); background: var(–a-soft);
padding: 5px 13px; border-radius: 999px; letter-spacing: .5px;
}
.q-counter.sepe { color: var(–b1); background: var(–b-soft) }

.progress-wrap { height: 4px; background: var(–subtle) }
.progress-bar {
height: 100%;
background: linear-gradient(90deg, var(–a1), var(–a2));
transition: width .55s cubic-bezier(.4,0,.2,1);
}
.progress-bar.sepe { background: linear-gradient(90deg, var(–b1), var(–b2)) }

.quiz-body {
flex: 1; display: flex; align-items: flex-start;
justify-content: center; padding: 36px 16px 60px;
}

.quiz-card {
background: var(–surface); border: 1.5px solid var(–border);
border-radius: var(–r-lg); padding: 40px 40px 36px;
max-width: 700px; width: 100%;
box-shadow: var(–sh-lg);
animation: cardIn .4s cubic-bezier(.4,0,.2,1);
}
@keyframes cardIn {
from { opacity:0; transform:translateY(24px) scale(.99) }
to   { opacity:1; transform:translateY(0)  scale(1) }
}

.q-topic-tag {
display: inline-flex; align-items: center; gap: 5px;
font-family: ‘JetBrains Mono’, monospace; font-size: 10px;
font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
color: var(–a1); background: var(–a-soft);
padding: 5px 12px; border-radius: 6px; margin-bottom: 20px;
}
.q-topic-tag.sepe { color: var(–b1); background: var(–b-soft) }

.q-text {
font-family: ‘Sora’, sans-serif;
font-size: clamp(17px, 2.6vw, 22px);
font-weight: 700; line-height: 1.5; margin-bottom: 28px; color: var(–text);
}

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px }
.option {
display: flex; align-items: flex-start; gap: 14px;
padding: 15px 18px;
background: var(–bg); border: 1.5px solid var(–border);
border-radius: var(–r-sm);
cursor: pointer; transition: all .16s;
font-size: 14.5px; line-height: 1.5; text-align: left;
color: var(–text-2); font-family: ‘Plus Jakarta Sans’, sans-serif;
font-weight: 600; width: 100%;
}
.option:hover:not(.locked) {
border-color: var(–a1); background: var(–a-soft);
color: var(–text); transform: translateX(4px);
box-shadow: 0 0 0 3px var(–a-soft);
}
.option-key {
flex-shrink: 0; min-width: 28px; height: 28px; border-radius: 8px;
background: var(–subtle); display: flex; align-items: center; justify-content: center;
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; font-weight: 700;
color: var(–muted); margin-top: 0px; transition: all .16s; letter-spacing: .5px;
}
.option.correct { border-color: var(–green); background: rgba(14,164,114,.08); color: var(–text) }
.option.correct .option-key { background: var(–green); color: #fff }
.option.wrong   { border-color: var(–red); background: rgba(224,49,49,.07); color: var(–text) }
.option.wrong .option-key   { background: var(–red); color: #fff }
.option.locked  { cursor: default; transform: none; box-shadow: none }

.explanation-box {
background: #f0fdf8; border: 1.5px solid rgba(14,164,114,.25);
border-left: 4px solid var(–green); border-radius: var(–r-sm);
padding: 16px 18px; font-size: 14px; color: var(–text-2);
line-height: 1.7; margin-bottom: 24px; display: none; font-weight: 500;
}
.explanation-box.show { display: block; animation: fadeUp .28s ease }
.explanation-box.wrong-exp {
background: #fff5f5; border-color: rgba(224,49,49,.25); border-left-color: var(–red);
}

.quiz-nav { display: flex; justify-content: flex-end; padding-top: 4px }

/* ── RESULTS ── */
#results {
align-items: center; justify-content: center;
padding: 64px 20px; text-align: center;
}
.results-inner { max-width: 560px; width: 100% }

.score-ring { width: 160px; height: 160px; margin: 0 auto 32px; position: relative }
.score-ring svg { transform: rotate(-90deg) }
.score-center {
position: absolute; inset: 0;
display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-num {
font-family: ‘Sora’, sans-serif; font-size: 42px; font-weight: 800;
background: linear-gradient(135deg, var(–a1), var(–b1));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
line-height: 1;
}
.score-label {
font-size: 9px; color: var(–muted); margin-top: 3px;
font-family: ‘JetBrains Mono’, monospace; letter-spacing: 2px; text-transform: uppercase;
}

.results-title {
font-family: ‘Sora’, sans-serif; font-size: 30px;
font-weight: 800; margin-bottom: 10px; color: var(–text); letter-spacing: -0.5px;
}
.results-sub { color: var(–text-2); font-size: 15px; margin-bottom: 36px; line-height: 1.7 }

.breakdown { display: flex; justify-content: center; gap: 14px; margin-bottom: 28px; flex-wrap: wrap }
.breakdown-item {
background: var(–surface); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 16px 22px; text-align: center;
min-width: 96px; box-shadow: var(–sh);
}
.breakdown-val {
font-family: ‘Sora’, sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 4px;
}
.breakdown-val.c { color: var(–green) }
.breakdown-val.w { color: var(–red) }
.breakdown-lbl {
font-size: 10px; color: var(–muted); text-transform: uppercase;
letter-spacing: 1px; font-family: ‘JetBrains Mono’, monospace; font-weight: 700;
}

.topic-breakdown {
background: var(–surface); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 22px; margin-bottom: 28px;
text-align: left; box-shadow: var(–sh);
}
.tb-title {
font-size: 10px; color: var(–muted); font-family: ‘JetBrains Mono’, monospace;
letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 18px; font-weight: 700;
}
.tb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px }
.tb-name { flex: 1; color: var(–text); line-height: 1.3; font-size: 13px; font-weight: 600 }
.tb-bar-wrap {
width: 120px; height: 7px; background: var(–subtle);
border-radius: 999px; overflow: hidden; flex-shrink: 0;
}
.tb-bar {
height: 100%; border-radius: 999px;
background: linear-gradient(90deg, var(–a1), var(–a2));
transition: width 1s cubic-bezier(.4,0,.2,1);
}
.tb-bar.sepe { background: linear-gradient(90deg, var(–b1), var(–b2)) }
.tb-score {
font-family: ‘JetBrains Mono’, monospace; font-size: 11px;
color: var(–muted); width: 36px; text-align: right; flex-shrink: 0; font-weight: 700;
}

.course-badge-r {
display: inline-flex; align-items: center; gap: 6px;
font-family: ‘JetBrains Mono’, monospace; font-size: 10px; font-weight: 700;
letter-spacing: 1.5px; text-transform: uppercase;
padding: 6px 16px; border-radius: 999px; margin-bottom: 22px;
}
.course-badge-r.gold {
background: linear-gradient(135deg, var(–a1), var(–a2));
color: #fff; box-shadow: 0 4px 16px var(–a-glow);
}
.course-badge-r.blue {
background: linear-gradient(135deg, var(–b1), var(–b2));
color: #fff; box-shadow: 0 4px 16px var(–b-glow);
}
</style>

</head>

      </div>
    </div>
    <div class="course-panel" id="panel-sepe">
      <div class="section-label blue" id="ui-select-topics-b">Selecciona los módulos</div>
      <div class="topic-grid" id="grid-sepe"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="selectAll('sepe')" id="ui-selectall-b">Seleccionar todo</button>

      </div>
    </div>
  </div>
</div>

<!-- QUIZ -->

<div id="quiz" class="page">
  <div class="quiz-topbar">
    <span class="quiz-logo" id="quizLogoLabel">Contabilidad</span>
    <div class="quiz-meta">
      <span class="q-counter" id="qCounter">1 / 10</span>
      <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="goHome()" id="ui-exit">← Salir</button>
    </div>

  {t:1,q:{es:"¿Cuál es la diferencia entre resultado de explotación y resultado financiero?",de:"Was ist der Unterschied zwischen Betriebsergebnis und Finanzergebnis?"},o:{es:["No existe diferencia","El de explotación surge de la actividad principal; el financiero de operaciones financieras","El resultado financiero es siempre positivo","El de explotación incluye los impuestos"],de:["Es gibt keinen Unterschied","Das Betriebsergebnis stammt aus der Haupttätigkeit; das Finanzergebnis aus Finanzoperationen","Das Finanzergebnis ist immer positiv","Das Betriebsergebnis enthält die Steuern"]},a:1,e:{es:"El resultado de explotación (EBIT) refleja el rendimiento de la actividad principal. El resultado financiero recoge ingresos y gastos financieros.",de:"Das Betriebsergebnis (EBIT) spiegelt die Leistung der Haupttätigkeit wider. Das Finanzergebnis umfasst Finanzerträge und -aufwendungen."}},

  {t:1,q:{es:"¿Qué es el EBITDA?",de:"Was ist das EBITDA?"},o:{es:["El resultado neto después de impuestos","El resultado antes de intereses, impuestos, depreciaciones y amortizaciones","El volumen total de ventas","El beneficio distribuido a los accionistas"],de:["Das Nettoergebnis nach Steuern","Das Ergebnis vor Zinsen, Steuern, Abschreibungen (EBITDA)","Der Gesamtumsatz","Der an die Aktionäre ausgeschüttete Gewinn"]},a:1,e:{es:"El EBITDA mide la capacidad de generar beneficios de la actividad operativa sin considerar aspectos financieros ni contables.",de:"Das EBITDA misst die Fähigkeit, aus der operativen Tätigkeit Gewinne zu erzielen, ohne Finanz- und Buchführungsaspekte zu berücksichtigen."}},

  {t:1,q:{es:"¿Qué es el Fondo de Maniobra?",de:"Was ist das Working Capital (Nettoumlaufvermögen)?"},o:{es:["La diferencia entre ingresos y gastos del ejercicio","La diferencia entre el Activo Corriente y el Pasivo Corriente","El total del patrimonio neto","El resultado antes de impuestos"],de:["Die Differenz zwischen Erträgen und Aufwendungen des Geschäftsjahres","Die Differenz zwischen Umlaufvermögen und kurzfristigem Fremdkapital","Das gesamte Eigenkapital","Das Ergebnis vor Steuern"]},a:1,e:{es:"El Fondo de Maniobra (FM = AC − PC) indica el margen de seguridad para hacer frente a obligaciones a corto plazo.",de:"Das Working Capital (WC = UV − KF) gibt die Sicherheitsmarge für kurzfristige Verbindlichkeiten an."}},

  {t:1,q:{es:"¿Qué indica la Rentabilidad Económica (ROA)?",de:"Was zeigt die wirtschaftliche Rentabilität (ROA) an?"},o:{es:["La rentabilidad para los accionistas","La rentabilidad generada por los activos totales","La capacidad de pago de deudas","El margen bruto sobre ventas"],de:["Die Rentabilität für die Aktionäre","Die durch das Gesamtvermögen erzielte Rentabilität","Die Schuldendeckungsfähigkeit","Die Bruttomarge auf Umsätze"]},a:1,e:{es:"El ROA (Resultado de explotación / Activo Total) mide la eficiencia con la que la empresa utiliza sus activos para generar beneficio.",de:"Der ROA (Betriebsergebnis / Gesamtvermögen) misst die Effizienz, mit der das Unternehmen seine Aktiva zur Gewinnerzielung einsetzt."}},

  {t:1,q:{es:"Un Fondo de Maniobra negativo implica:",de:"Ein negatives Working Capital bedeutet:"},o:{es:["Que la empresa tiene mucha tesorería","Que el Pasivo Corriente supera al Activo Corriente, situación de riesgo","Que la empresa es muy rentable","Que el patrimonio neto es elevado"],de:["Dass das Unternehmen viel Liquidität hat","Dass das kurzfristige Fremdkapital das Umlaufvermögen übersteigt – eine Risikolage","Dass das Unternehmen sehr rentabel ist","Dass das Eigenkapital hoch ist"]},a:1,e:{es:"FM negativo: el Pasivo Corriente supera al Activo Corriente. La empresa financia activos a largo plazo con deudas a corto.",de:"Negatives WC: Kurzfristiges Fremdkapital übersteigt Umlaufvermögen. Das Unternehmen finanziert langfristige Aktiva mit kurzfristigen Schulden – Finanzierungsrisiko."}},

  {t:1,q:{es:"¿Qué mide la Rentabilidad Financiera (ROE)?",de:"Was misst die finanzielle Rentabilität (ROE)?"},o:{es:["La eficiencia en el uso de todos los activos","El rendimiento obtenido por los fondos propios de los accionistas","El margen de beneficio sobre ventas","La capacidad de endeudamiento"],de:["Die Effizienz im Einsatz aller Aktiva","Die Rendite auf das Eigenkapital der Aktionäre","Die Gewinnmarge auf Umsätze","Die Verschuldungskapazität"]},a:1,e:{es:"El ROE (Resultado neto / Fondos Propios) mide la rentabilidad que obtienen los propietarios sobre su inversión.",de:"Der ROE (Nettoergebnis / Eigenkapital) misst die Rendite, die die Eigentümer auf ihre Investition erzielen."}},

  {t:1,q:{es:"¿Qué diferencia el análisis estático del dinámico?",de:"Was unterscheidet die statische von der dynamischen Analyse?"},o:{es:["El estático analiza varios ejercicios; el dinámico solo uno","El estático analiza la situación en un momento concreto; el dinámico estudia la evolución en el tiempo","No existe diferencia relevante","El dinámico solo se usa en grandes empresas"],de:["Die statische Analyse betrachtet mehrere Geschäftsjahre; die dynamische nur eines","Die statische Analyse betrachtet die Lage zu einem bestimmten Zeitpunkt; die dynamische die Entwicklung über die Zeit","Es gibt keinen relevanten Unterschied","Die dynamische Analyse wird nur in Großunternehmen verwendet"]},a:1,e:{es:"El análisis estático estudia la situación en un momento dado. El dinámico compara varios períodos para evaluar la evolución.",de:"Die statische Analyse untersucht die Situation zu einem bestimmten Zeitpunkt. Die dynamische vergleicht mehrere Perioden, um die Entwicklung zu bewerten."}},

  {t:1,q:{es:"¿Qué muestra el análisis de la estructura del activo?",de:"Was zeigt die Analyse der Vermögensstruktur?"},o:{es:["El nivel de deudas de la empresa","Cómo están distribuidos los recursos entre activo corriente y no corriente","Los gastos del ejercicio","El capital social de la empresa"],de:["Den Verschuldungsgrad des Unternehmens","Wie die Mittel zwischen Umlauf- und Anlagevermögen verteilt sind","Die Aufwendungen des Geschäftsjahres","Das Stammkapital des Unternehmens"]},a:1,e:{es:"El análisis de la estructura del activo estudia la composición y proporción entre activo corriente y no corriente.",de:"Die Analyse der Vermögensstruktur untersucht die Zusammensetzung und das Verhältnis zwischen Umlauf- und Anlagevermögen."}},

  // MÓDULO 2: Control de costes
  {t:2,q:{es:"¿Cuál es la diferencia entre coste fijo y coste variable?",de:"Was ist der Unterschied zwischen fixen und variablen Kosten?"},o:{es:["Los fijos cambian con la producción; los variables no","Los fijos no cambian con la producción; los variables sí","Ambos cambian con la producción","Ninguno cambia con la producción"],de:["Fixkosten ändern sich mit der Produktion; variable nicht","Fixkosten ändern sich nicht mit der Produktion; variable Kosten schon","Beide ändern sich mit der Produktion","Keiner ändert sich mit der Produktion"]},a:1,e:{es:"Los costes fijos (alquiler, seguros) permanecen constantes. Los costes variables (materias primas) cambian proporcionalmente al volumen producido.",de:"Fixkosten (Miete, Versicherungen) bleiben konstant. Variable Kosten (Rohstoffe) ändern sich proportional zur Produktionsmenge."}},

  {t:2,q:{es:"¿Qué es el punto de equilibrio o umbral de rentabilidad?",de:"Was ist die Gewinnschwelle (Break-Even-Point)?"},o:{es:["El punto donde los costes fijos igualan a los variables","El nivel de ventas donde los ingresos totales igualan a los costes totales","El nivel máximo de producción","El precio mínimo de venta"],de:["Der Punkt, wo Fixkosten gleich variable Kosten sind","Das Umsatzniveau, bei dem Gesamterträge gleich Gesamtkosten sind","Das maximale Produktionsniveau","Der Mindestverkaufspreis"]},a:1,e:{es:"El punto de equilibrio es el volumen de ventas necesario para cubrir todos los costes, sin beneficio ni pérdidas.",de:"Die Gewinnschwelle ist das Umsatzvolumen, das zur Deckung aller Kosten erforderlich ist – weder Gewinn noch Verlust."}},

  {t:2,q:{es:"¿Cómo se calcula el Margen de Contribución unitario?",de:"Wie berechnet sich der Deckungsbeitrag pro Einheit?"},o:{es:["Precio de venta − Costes fijos","Precio de venta − Coste variable unitario","Ingresos totales − Costes totales","Beneficio neto / Ventas"],de:["Verkaufspreis − Fixkosten","Verkaufspreis − Variable Stückkosten","Gesamterträge − Gesamtkosten","Nettogewinn / Umsatz"]},a:1,e:{es:"El Margen de Contribución unitario = Precio de venta − Coste variable unitario. Indica cuánto contribuye cada unidad a cubrir costes fijos.",de:"Deckungsbeitrag je Einheit = Verkaufspreis − Variable Stückkosten. Er zeigt, wie viel jede Einheit zur Deckung der Fixkosten beiträgt."}},

  {t:2,q:{es:"¿Qué es el coste de oportunidad?",de:"Was sind Opportunitätskosten?"},o:{es:["El coste de almacenar los productos","El beneficio al que se renuncia al elegir una alternativa sobre otra","El coste de producir una unidad adicional","Los gastos financieros de un préstamo"],de:["Die Kosten der Produktlagerung","Der Nutzen, auf den man beim Wählen einer Alternative gegenüber einer anderen verzichtet","Die Kosten der Produktion einer zusätzlichen Einheit","Die Finanzierungskosten eines Darlehens"]},a:1,e:{es:"El coste de oportunidad es el valor de la mejor alternativa desechada al tomar una decisión.",de:"Opportunitätskosten sind der Wert der besten aufgegebenen Alternative bei einer Entscheidung."}},

  {t:2,q:{es:"¿Qué analiza el análisis 'make or buy'?",de:"Was analysiert die 'Make-or-Buy'-Entscheidung?"},o:{es:["Si lanzar un nuevo producto al mercado","Si fabricar internamente un componente o subcontratarlo a un proveedor externo","Si contratar más personal","Si ampliar las instalaciones"],de:["Ob ein neues Produkt auf den Markt gebracht wird","Ob ein Bauteil intern produziert oder an einen externen Lieferanten ausgelagert wird","Ob mehr Personal eingestellt wird","Ob die Anlagen erweitert werden"]},a:1,e:{es:"El análisis 'make or buy' compara el coste de producción interno frente al precio de adquisición en el mercado.",de:"Die Make-or-Buy-Analyse vergleicht die internen Produktionskosten mit dem Marktbeschaffungspreis, um die effizientere Option zu bestimmen."}},

  {t:2,q:{es:"¿Qué es el coste primo o coste directo?",de:"Was sind Einzelkosten (Primärkosten)?"},o:{es:["La suma de todos los costes de la empresa","La suma de los costes directos de materiales y mano de obra directa","Solo los gastos generales de fabricación","El coste de distribución"],de:["Die Summe aller Unternehmenskosten","Die Summe der direkten Material- und Fertigungslohnkosten","Nur die allgemeinen Herstellungskosten","Die Vertriebskosten"]},a:1,e:{es:"El coste primo incluye los costes directamente atribuibles al Produkt: Materiales Directos + Mano de Obra Directa.",de:"Einzelkosten umfassen direkt dem Produkt zurechenbare Kosten: Direktmaterial + Fertigungslöhne."}},

  {t:2,q:{es:"Si el precio es 50 €, el coste variable unitario 30 € y los costes fijos 4.000 €, ¿cuál es el punto de equilibrio en unidades?",de:"Wenn der Preis 50 €, die variablen Stückkosten 30 € und die Fixkosten 4.000 € betragen, wie hoch ist die Gewinnschwelle in Einheiten?"},o:{es:["100 unidades","133 unidades","200 unidades","80 unidades"],de:["100 Einheiten","133 Einheiten","200 Einheiten","80 Einheiten"]},a:2,e:{es:"Punto de equilibrio = Costes Fijos / Margen de Contribución = 4.000 / (50−30) = 4.000 / 20 = 200 unidades.",de:"Gewinnschwelle = Fixkosten / Deckungsbeitrag je Einheit = 4.000 / (50−30) = 4.000 / 20 = 200 Einheiten."}},

  {t:2,q:{es:"¿Qué es el sistema de costes por absorción (full costing)?",de:"Was ist das Vollkostenverfahren (Full Costing)?"},o:{es:["Un sistema donde solo se imputan los costes variables al producto","Un sistema donde tanto costes fijos como variables se incluyen en el coste del producto","Un sistema exclusivo para grandes empresas","Un sistema que solo considera materiales"],de:["Ein System, bei dem nur variable Kosten dem Produkt zugerechnet werden","Ein System, bei dem sowohl fixe als auch variable Kosten in den Produktkosten enthalten sind","Ein System nur für Großunternehmen","Ein System, das nur Materialien berücksichtigt"]},a:1,e:{es:"El full costing imputa al producto tanto los costes variables como los fijos de fabricación, ofreciendo el coste total de producción.",de:"Das Vollkostenverfahren rechnet dem Produkt sowohl variable als auch fixe Fertigungskosten zu und ergibt die vollständigen Herstellungskosten."}},

  {t:2,q:{es:"¿Qué es el coste de conversión?",de:"Was sind Konversionskosten?"},o:{es:["El coste de convertir materias primas en divisas","Mano de obra directa + costes indirectos de fabricación","Solo el coste de amortización de maquinaria","El coste de comercialización"],de:["Die Kosten der Umrechnung von Rohstoffen in Devisen","Fertigungslöhne + Gemeinkosten der Fertigung","Nur die Maschinenabschreibungskosten","Die Vermarktungskosten"]},a:1,e:{es:"El coste de conversión = Mano de Obra Directa + Costes Indirectos de Fabricación. Representa el esfuerzo productivo para transformar las materias primas.",de:"Konversionskosten = Fertigungslöhne + Gemeinkosten der Fertigung. Sie repräsentieren den Produktionsaufwand zur Umwandlung der Rohstoffe."}},

  {t:2,q:{es:"¿Qué es la imputación de costes indirectos?",de:"Was ist die Zurechnung von Gemeinkosten?"},o:{es:["El registro directo de materias primas a un producto","El proceso de asignar costes no atribuibles directamente mediante criterios de reparto","La suma de todos los costes fijos","El cálculo del precio de venta"],de:["Die direkte Erfassung von Rohstoffen für ein Produkt","Der Prozess der Zuweisung nicht direkt zurechenbarer Kosten nach Verteilungsschlüsseln","Die Summe aller Fixkosten","Die Berechnung des Verkaufspreises"]},a:1,e:{es:"Los costes indirectos se reparten entre productos mediante bases de imputación (horas máquina, m², etc.).",de:"Gemeinkosten werden mittels Verteilungsschlüsseln (Maschinenstunden, m² usw.) auf die Produkte verteilt."}},

  // MÓDULO 3: Presupuestos
  {t:3,q:{es:"¿Qué es un presupuesto empresarial?",de:"Was ist ein Unternehmensbudget?"},o:{es:["Un documento exclusivo del departamento financiero","La cuantificación económica de los planes y objetivos de la empresa para un período futuro","El registro contable de las operaciones pasadas","Un informe de auditoría interna"],de:["Ein Dokument ausschließlich der Finanzabteilung","Die wirtschaftliche Quantifizierung der Pläne und Ziele des Unternehmens für einen zukünftigen Zeitraum","Die buchhalterische Erfassung vergangener Vorgänge","Ein interner Prüfbericht"]},a:1,e:{es:"El presupuesto es la expresión cuantitativa y temporal de los planes de la empresa: anticipa ingresos, gastos e inversiones previstas.",de:"Das Budget ist der quantitative und zeitliche Ausdruck der Unternehmenspläne: Es antizipiert geplante Erträge, Aufwendungen und Investitionen."}},

  {t:3,q:{es:"¿Qué es una desviación presupuestaria?",de:"Was ist eine Budgetabweichung?"},o:{es:["El error de cálculo en la contabilidad financiera","La diferencia entre el valor real obtenido y el valor presupuestado","El resultado negativo del ejercicio","La diferencia entre activo y pasivo"],de:["Der Rechenfehler in der Finanzbuchhaltung","Die Differenz zwischen dem tatsächlichen und dem geplanten Wert","Das negative Jahresergebnis","Die Differenz zwischen Aktiva und Fremdkapital"]},a:1,e:{es:"La desviación presupuestaria es la diferencia entre lo planificado (presupuesto) y lo que realmente ha ocurrido. Puede ser favorable o desfavorable.",de:"Die Budgetabweichung ist die Differenz zwischen dem Geplanten (Budget) und dem tatsächlich Eingetretenen. Sie kann günstig oder ungünstig sein."}},

  {t:3,q:{es:"¿Qué es el presupuesto maestro?",de:"Was ist das Masterbudget?"},o:{es:["El presupuesto de mayor importe","El conjunto integrado de todos los presupuestos parciales de la empresa","Solo el presupuesto de ventas","El presupuesto aprobado por los accionistas"],de:["Das Budget mit dem höchsten Betrag","Die integrierte Gesamtheit aller Teilbudgets des Unternehmens","Nur das Umsatzbudget","Das von den Aktionären genehmigte Budget"]},a:1,e:{es:"El presupuesto maestro integra todos los presupuestos funcionales (ventas, producción, compras, gastos) en un plan económico-financiero completo.",de:"Das Masterbudget integriert alle Funktionsbudgets (Umsatz, Produktion, Einkauf, Kosten) in einen vollständigen wirtschaftlich-finanziellen Plan."}},

  {t:3,q:{es:"¿Cuál es la secuencia lógica para elaborar el sistema presupuestario?",de:"Was ist die logische Reihenfolge bei der Erstellung des Budgetsystems?"},o:{es:["Primero el presupuesto de gastos, luego el de ventas","Primero el de ventas, después producción, compras, gastos y finalmente el financiero","Primero el financiero, luego el de ventas","El orden es indiferente"],de:["Zuerst das Kostenbudget, dann das Umsatzbudget","Zuerst das Umsatzbudget, dann Produktion, Einkauf, Kosten und schließlich das Finanzbudget","Zuerst das Finanzbudget, dann das Umsatzbudget","Die Reihenfolge ist beliebig"]},a:1,e:{es:"El proceso parte del presupuesto de ventas, del que se deriva el de producción, luego compras, gastos generales y finalmente el presupuesto financiero.",de:"Der Prozess beginnt mit dem Umsatzbudget, aus dem sich Produktions-, Einkaufs-, Gemeinkosten- und schließlich das Finanzbudget ableiten."}},

  {t:3,q:{es:"Una desviación en costes es favorable cuando:",de:"Eine Kostenabweichung ist günstig, wenn:"},o:{es:["El coste real es mayor que el presupuestado","El coste real es igual al presupuestado","El coste real es menor que el presupuestado","El coste real duplica al presupuestado"],de:["Die Istkosten größer als die Plankosten sind","Die Istkosten gleich den Plankosten sind","Die Istkosten kleiner als die Plankosten sind","Die Istkosten doppelt so hoch wie die Plankosten sind"]},a:2,e:{es:"Una desviación de costes es favorable cuando el coste real resulta inferior al coste presupuestado: un ahorro.",de:"Eine Kostenabweichung ist günstig, wenn die Istkosten unter den Plankosten liegen – eine Einsparung gegenüber dem Plan."}},

  {t:3,q:{es:"¿Qué es el presupuesto de tesorería?",de:"Was ist der Liquiditätsplan (Kassenbudget)?"},o:{es:["El presupuesto de ingresos por ventas únicamente","La previsión de los cobros y pagos para asegurar la liquidez en cada período","El presupuesto de gastos de personal","El plan de inversiones en activo fijo"],de:["Nur das Ertragsbudget aus Umsätzen","Die Planung der Einnahmen und Ausgaben zur Sicherung der Liquidität in jedem Zeitraum","Das Personalkostenbudget","Der Investitionsplan für Anlagevermögen"]},a:1,e:{es:"El presupuesto de tesorería prevé los cobros y pagos esperados para cada período, asegurando que la empresa disponga de liquidez.",de:"Der Liquiditätsplan prognostiziert die erwarteten Einnahmen und Ausgaben für jeden Zeitraum und stellt sicher, dass das Unternehmen über ausreichende Liquidität verfügt."}},

  {t:3,q:{es:"¿Para qué sirve el análisis de desviaciones presupuestarias?",de:"Wozu dient die Analyse von Budgetabweichungen?"},o:{es:["Para registrar las operaciones contables del ejercicio","Para identificar las causas de las diferencias entre lo planificado y lo real, y tomar medidas correctoras","Para calcular los impuestos del ejercicio","Para elaborar el balance de situación"],de:["Zur Erfassung buchhalterischer Vorgänge des Geschäftsjahres","Um die Ursachen der Unterschiede zwischen Plan und Ist zu identifizieren und Korrekturmaßnahmen zu ergreifen","Zur Berechnung der Jahressteuern","Zur Erstellung der Bilanz"]},a:1,e:{es:"El análisis de desviaciones detecta dónde y por qué los resultados difieren del plan, facilitando la toma de decisiones correctoras.",de:"Die Abweichungsanalyse erkennt, wo und warum die Ergebnisse vom Plan abweichen, und erleichtert Korrekturentscheidungen."}},

  {t:3,q:{es:"¿Qué es el presupuesto base cero?",de:"Was ist das Zero-Base-Budgeting?"},o:{es:["Un presupuesto que parte de los datos del ejercicio anterior ajustados","Un método donde cada partida debe justificarse desde cero, sin asumir gastos históricos","Un presupuesto sin estimación de ingresos","Un presupuesto exclusivo para el sector público"],de:["Ein Budget, das von den angepassten Daten des Vorjahres ausgeht","Eine Methode, bei der jede Position von Null an begründet werden muss, ohne historische Kosten vorauszusetzen","Ein Budget ohne Ertragsprognose","Ein Budget ausschließlich für den öffentlichen Sektor"]},a:1,e:{es:"En el presupuesto base cero, cada departamento justifica todos sus gastos desde cero cada período, fomentando la eficiencia.",de:"Beim Zero-Base-Budgeting muss jede Abteilung alle ihre Kosten in jedem Zeitraum von Null an begründen – dies fördert Effizienz."}},

  {t:3,q:{es:"La desviación en ventas puede descomponerse en:",de:"Die Umsatzabweichung kann unterteilt werden in:"},o:{es:["Desviación de precio y desviación de volumen","Desviación de coste fijo y coste variable","Solo desviación de precio","Solo desviación de cantidad"],de:["Preisabweichung und Mengenabweichung","Fixkosten- und variable Kostenabweichung","Nur Preisabweichung","Nur Mengenabweichung"]},a:0,e:{es:"La desviación total en ventas = Desviación de precio + Desviación de volumen.",de:"Die Gesamtumsatzabweichung = Preisabweichung (Ist- vs. Planpreis) + Mengenabweichung (Ist- vs. Planmenge)."}},

  {t:3,q:{es:"¿Qué es el presupuesto flexible?",de:"Was ist ein flexibles Budget?"},o:{es:["Un presupuesto que no tiene en cuenta los costes variables","Un presupuesto que se adapta al nivel de actividad real para comparar de forma más justa","Un presupuesto aprobado sin límite de gasto","Un presupuesto solo para grandes empresas"],de:["Ein Budget, das variable Kosten nicht berücksichtigt","Ein Budget, das sich dem tatsächlichen Aktivitätsniveau anpasst, um fairere Vergleiche zu ermöglichen","Ein Budget ohne Ausgabenobergrenze","Ein Budget nur für Großunternehmen"]},a:1,e:{es:"El presupuesto flexible recalcula los costes presupuestados al nivel de actividad real, permitiendo comparaciones más justas.",de:"Das flexible Budget berechnet die geplanten Kosten auf Basis des tatsächlichen Aktivitätsniveaus und ermöglicht so fairere Vergleiche als ein starres Budget."}},

  // MÓDULO 4: Obligaciones fiscales
  {t:4,q:{es:"¿Qué es el Impuesto sobre Sociedades?",de:"Was ist die Körperschaftsteuer (Impuesto sobre Sociedades)?"},o:{es:["Un impuesto sobre las ventas de las empresas","Un impuesto directo que grava el beneficio obtenido por las sociedades mercantiles","Un impuesto sobre el patrimonio de los directivos","Un impuesto indirecto sobre el consumo"],de:["Eine Steuer auf den Umsatz der Unternehmen","Eine direkte Steuer auf den Gewinn von Handelsgesellschaften","Eine Steuer auf das Vermögen der Führungskräfte","Eine indirekte Verbrauchsteuer"]},a:1,e:{es:"El Impuesto sobre Sociedades (IS) es un impuesto directo que grava la renta (beneficio) obtenida por personas jurídicas.",de:"Die Körperschaftsteuer ist eine direkte Steuer, die den Gewinn juristischer Personen (Unternehmen, Gesellschaften) besteuert."}},

  {t:4,q:{es:"¿Cuál es el tipo general del Impuesto sobre Sociedades en España?",de:"Wie hoch ist der allgemeine Körperschaftsteuersatz in Spanien?"},o:{es:["15%","20%","25%","30%"],de:["15%","20%","25%","30%"]},a:2,e:{es:"El tipo general del Impuesto sobre Sociedades en España es del 25%. Existen tipos reducidos (15%) para empresas de nueva creación.",de:"Der allgemeine Körperschaftsteuersatz in Spanien beträgt 25%. Es gibt ermäßigte Sätze (15%) für neu gegründete Unternehmen."}},

  {t:4,q:{es:"¿Qué es el modelo 303 en materia fiscal?",de:"Was ist das Formular 303 im Steuerrecht?"},o:{es:["La declaración anual del Impuesto sobre Sociedades","La autoliquidación periódica del IVA","La declaración del IRPF","El modelo de alta en el IAE"],de:["Die jährliche Körperschaftsteuererklärung","Die periodische MwSt.-Selbstveranlagung","Die Einkommensteuererklärung","Das Anmeldeformular für die IAE"]},a:1,e:{es:"El modelo 303 es la autoliquidación del IVA que deben presentar empresas y autónomos, habitualmente de forma trimestral.",de:"Formular 303 ist die MwSt.-Selbstveranlagung, die Unternehmen und Selbständige üblicherweise vierteljährlich einreichen müssen."}},

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let lang = 'es';
let activeCourse = 'basica';
let selectedA = new Set([0,1,2,3,4,5,6]);
let selectedB = new Set([0,1,2,3,4]);
let quizQuestions = [], currentIdx = 0, answers = [], currentCourse = 'basica';

// ═══════════════════════════════════════════════════════
// LANGUAGE SWITCHER
// ═══════════════════════════════════════════════════════
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  applyUITranslations();
  rebuildGrids();
}

function applyUITranslations() {
  const t = UI[lang];
  document.getElementById('ui-badge').textContent = t.badge;
  const titleEl = document.getElementById('ui-title');
  titleEl.innerHTML = t.title.replace('\n','<br>');
  document.getElementById('ui-sub').textContent = t.sub;
  document.getElementById('tab-basica-btn').textContent = t.tabBasica;
  document.getElementById('tab-sepe-btn').textContent = t.tabSepe;
  document.getElementById('ui-select-topics-a').textContent = t.selectTopicsA;
  document.getElementById('ui-select-topics-b').textContent = t.selectTopicsB;
  document.querySelectorAll('[id^="ui-selectall"]').forEach(el => el.textContent = t.selectAll);
  document.getElementById('ui-start-a').textContent = t.startQuiz;
  document.getElementById('ui-start-b').textContent = t.startQuiz;
  document.getElementById('ui-exit').textContent = t.exit;
  document.getElementById('nextBtn').textContent = t.next;
  document.getElementById('restartBtn').textContent = t.restart;
  document.getElementById('ui-change-topics').textContent = t.changeTopics;
  document.getElementById('ui-result-label').textContent = t.resultLabel;
  document.getElementById('ui-correct-lbl').textContent = t.correct;
  document.getElementById('ui-wrong-lbl').textContent = t.wrong;
  document.getElementById('ui-total-lbl').textContent = t.total;
}

// ═══════════════════════════════════════════════════════
// BUILD GRIDS
// ═══════════════════════════════════════════════════════
function buildGrid(gridId, topicsObj, selSet, colorClass, prefix) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  topicsObj[lang].forEach((name, i) => {
    const card = document.createElement('div');
    card.className = `topic-card ${colorClass}${selSet.has(i) ? ' selected' : ''}`;
    card.dataset.idx = i;
    card.innerHTML = `<div class="topic-num">${prefix}${String(i+1).padStart(2,'0')}</div><div class="topic-name">${name}</div><div class="topic-check">✓</div>`;
    card.addEventListener('click', () => {
      if (selSet.has(i)) { if (selSet.size === 1) return; selSet.delete(i); card.classList.remove('selected'); }
      else { selSet.add(i); card.classList.add('selected'); }
    });
    grid.appendChild(card);
  });
}

function rebuildGrids() {
  buildGrid('grid-basica', TOPICS_A, selectedA, 'gold-card', 'T');
  buildGrid('grid-sepe',   TOPICS_B, selectedB, 'blue-card', 'M');
}

rebuildGrids();

function switchCourse(c) {
  activeCourse = c;
  document.querySelectorAll('.course-tab').forEach(el => el.classList.remove('active-tab'));
  document.querySelector(`.tab-${c}`).classList.add('active-tab');
  document.querySelectorAll('.course-panel').forEach(el => el.classList.remove('active-panel'));
  document.getElementById(`panel-${c}`).classList.add('active-panel');
}

function selectAll(c) {
  const [sel, gid, tops] = c === 'basica' ? [selectedA,'grid-basica',TOPICS_A] : [selectedB,'grid-sepe',TOPICS_B];
  tops[lang].forEach((_,i) => sel.add(i));
  document.querySelectorAll(`#${gid} .topic-card`).forEach(el => el.classList.add('selected'));
}

// ═══════════════════════════════════════════════════════
// START QUIZ
// ═══════════════════════════════════════════════════════
function startQuiz(c) {
  currentCourse = c;
  const [qBank, sel] = c === 'basica' ? [QA, selectedA] : [QB, selectedB];
  const pool = qBank.filter(q => sel.has(q.t));
  quizQuestions = [...pool].sort(() => Math.random() - .5).slice(0, Math.min(10, pool.length));
  currentIdx = 0; answers = [];
  const isSepe = c === 'sepe';
  const t = UI[lang];
  document.getElementById('quizLogoLabel').className = isSepe ? 'quiz-logo sepe' : 'quiz-logo';
  document.getElementById('quizLogoLabel').textContent = isSepe ? t.logoSepe : t.logoBasica;
  document.getElementById('qCounter').className = isSepe ? 'q-counter sepe' : 'q-counter';
  document.getElementById('progressBar').className = isSepe ? 'progress-bar sepe' : 'progress-bar';
  document.getElementById('nextBtn').className = isSepe ? 'btn btn-blue' : 'btn btn-gold';
  document.getElementById('nextBtn').textContent = t.next;
  showPage('quiz');
  renderQuestion();
}

// ═══════════════════════════════════════════════════════
// QUIZ RENDER
// ═══════════════════════════════════════════════════════
function renderQuestion() {
  const q = quizQuestions[currentIdx], total = quizQuestions.length;
  const isSepe = currentCourse === 'sepe';
  const topics = isSepe ? TOPICS_B : TOPICS_A;
  const t = UI[lang];
  document.getElementById('qCounter').textContent = `${currentIdx+1} / ${total}`;
  document.getElementById('progressBar').style.width = `${(currentIdx/total)*100}%`;
  document.getElementById('qTopic').className = isSepe ? 'q-topic-tag sepe' : 'q-topic-tag';
  document.getElementById('qTopic').textContent = `${isSepe ? t.modulePrefix : t.topicPrefix} 0${q.t+1} · ${topics[lang][q.t].toUpperCase()}`;
  document.getElementById('qText').textContent = q.q[lang];

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A','B','C','D'];
  // shuffle option indices
  const shuffled = [0,1,2,3].sort(() => Math.random() - .5);
  shuffled.forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.dataset.correct = origIdx === q.a ? '1' : '0';
    btn.innerHTML = `<span class="option-key">${letters[pos]}</span><span>${q.o[lang][origIdx]}</span>`;
    btn.addEventListener('click', () => selectAnswer(btn, q));
    container.appendChild(btn);
  });

  document.getElementById('explanationBox').className = 'explanation-box';
  document.getElementById('nextBtn').style.display = 'none';
  const card = document.getElementById('quizCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'slideIn .35s cubic-bezier(.4,0,.2,1)';
}

function selectAnswer(btn, q) {
  document.querySelectorAll('.option').forEach(o => o.classList.add('locked'));
  const isCorrect = btn.dataset.correct === '1';
  answers.push({ correct: isCorrect, topicIdx: q.t });
  if (isCorrect) { btn.classList.add('correct'); }
  else { btn.classList.add('wrong'); document.querySelectorAll('.option').forEach(o => { if (o.dataset.correct === '1') o.classList.add('correct'); }); }
  const exp = document.getElementById('explanationBox');
  exp.textContent = q.e[lang];
  exp.className = 'explanation-box show' + (isCorrect ? '' : ' wrong-exp');
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function nextQuestion() { currentIdx++; if (currentIdx >= quizQuestions.length) showResults(); else renderQuestion(); }

// ═══════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════
function showResults() {
  showPage('results');
  const isSepe = currentCourse === 'sepe';
  const topics = isSepe ? TOPICS_B : TOPICS_A;
  const t = UI[lang];
  const total = answers.length;
  const correct = answers.filter(a => a.correct).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('resultBadge').className = isSepe ? 'course-badge-r blue' : 'course-badge-r gold';
  document.getElementById('resultBadge').textContent = isSepe ? t.badgeSepe : t.badgeBasica;
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = total - correct;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('totalCount').style.color = isSepe ? 'var(--blue)' : 'var(--gold)';
  document.getElementById('restartBtn').className = isSepe ? 'btn btn-blue' : 'btn btn-gold';
  document.getElementById('restartBtn').textContent = t.restart;
  document.getElementById('ui-change-topics').textContent = t.changeTopics;
  document.getElementById('ui-result-label').textContent = t.resultLabel;
  document.getElementById('ui-correct-lbl').textContent = t.correct;
  document.getElementById('ui-wrong-lbl').textContent = t.wrong;
  document.getElementById('ui-total-lbl').textContent = t.total;
  document.getElementById('rg1').setAttribute('stop-color', isSepe ? '#5b8dee' : '#f5c842');
  document.getElementById('rg2').setAttribute('stop-color', isSepe ? '#3ecf8e' : '#e07b3a');

  const offset = 421 - (421 * pct / 100);
  document.getElementById('scoreCircle').style.strokeDashoffset = 421;
  setTimeout(() => {
    document.getElementById('scoreCircle').style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
    document.getElementById('scoreCircle').style.strokeDashoffset = offset;
  }, 200);

  const scores = t.scores;
  let title, sub;
  if (pct >= 90) { [title,sub] = scores[90]; }
  else if (pct >= 70) { [title,sub] = scores[70]; }
  else if (pct >= 50) { [title,sub] = scores[50]; }
  else { [title,sub] = scores[0]; }
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;

  const topicStats = {};
  answers.forEach(a => {
    if (!topicStats[a.topicIdx]) topicStats[a.topicIdx] = { c: 0, total: 0 };
    topicStats[a.topicIdx].total++;
    if (a.correct) topicStats[a.topicIdx].c++;
  });

  const tb = document.getElementById('topicBreakdown');
  tb.innerHTML = `<div class="tb-title">${t.breakdownTitle(isSepe ? t.modulo : t.tema)}</div>`;
  Object.keys(topicStats).sort().forEach(ti => {
    const s = topicStats[ti], p = Math.round((s.c / s.total) * 100);
    const row = document.createElement('div');
    row.className = 'tb-row';
    row.innerHTML = `<div class="tb-name">${topics[lang][Number(ti)]}</div><div class="tb-bar-wrap"><div class="tb-bar${isSepe ? ' sepe' : ''}" style="width:0%" data-pct="${p}"></div></div><div class="tb-score">${s.c}/${s.total}</div>`;
    tb.appendChild(row);
  });
  setTimeout(() => { document.querySelectorAll('.tb-bar').forEach(b => b.style.width = b.dataset.pct + '%'); }, 400);
}

function restartQuiz() { startQuiz(currentCourse); }
function goHome() { showPage('home'); }
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
